<style>
    body.lmn-revamp {

        inset: 0;
        pointer-events: none;
        opacity: 0.22;
        background-image:

    }

    .lmn-topbar {

        background: rgba(255,255,255,0.86);
        border-bottom-color: rgba(117,141,122,0.28);
    }

        letter-spacing: 0.2px;
    }

    .lmn-panel {
        background: rgba(255,255,255,0.78);
        backdrop-filter: blur(14px);
        box-shadow: 0 18px 40px rgba(23, 48, 33, 0.12);
    }

    .lmn-panel .lmn-card {

        box-shadow: 0 6px 16px rgba(14, 32, 20, 0.08);
    }

    #directions-btn {

        background: rgba(255,255,255,0.68);
        border: 1px solid rgba(120,138,128,0.24);
        border-radius: 10px;
        padding: 7px 10px;
    }

    main.lmn-main > section:last-child {
        border-radius: 18px;
        overflow: hidden;
        margin: 10px 12px 10px 0;
        box-shadow: 0 16px 36px rgba(12, 30, 18, 0.18);
    }

    nav.lmn-bottom {
        backdrop-filter: blur(12px);
        background: rgba(255,255,255,0.9);
        border-top-color: rgba(117,141,122,0.3);
    }

    .lmn-animate-rise {
        animation: lmnRise .45s cubic-bezier(.2,.7,.2,1);
    }

    .menu-close-btn {
        display: none;
    }

    .menu-advanced {
        display: none;
    }

    body.menu-open .menu-close-btn {
        display: inline-flex;
    }

    body.menu-open .menu-advanced {
        display: block;
    }

    body.menu-open .lmn-panel {
        position: fixed;
        top: 44px;
        left: 0;
        right: 0;
        bottom: 64px;
        z-index: 1200;
        width: auto !important;
        max-width: none !important;
        height: auto !important;
        border-right: none;
    }

        from { transform: translateY(8px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
