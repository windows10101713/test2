<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LMN 모바일 메인 지도</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fbf9f8] text-[#1b1c1c] h-screen overflow-hidden">
  <header class="h-11 border-b border-[#becab9] bg-white px-4 flex items-center justify-between">
    <strong class="text-[#006e1c]">LMN</strong>
    <a href="index.html" class="text-xs text-[#0061a4]">목록</a>
  </header>

  <main class="h-[calc(100vh-44px-64px)] flex flex-col">
    <section class="h-1/2 border-b border-[#becab9] bg-white overflow-auto p-4 space-y-3">
      <div class="rounded-xl border border-[#becab9] p-3 flex justify-between items-center">
        <div>
          <p class="text-xs text-[#3f4a3c]">내 위치</p>
          <p class="text-sm" id="coords">(37.5665, 126.9780)</p>
        </div>
        <button class="h-11 px-3 rounded-lg bg-[#006e1c] text-white">내 위치 찾기</button>
      </div>

      <div class="flex gap-2">
        <input class="flex-1 h-11 rounded-lg border border-[#becab9] px-3" placeholder="서울역, 강남역, 병원..." />
        <button class="h-11 px-3 rounded-lg bg-[#0061a4] text-white">검색</button>
      </div>

      <button class="w-full h-11 rounded-lg bg-[#e18500] text-white">길찾기 열기</button>

      <div class="grid grid-cols-3 gap-2">
        <button class="h-[72px] rounded-lg border-b-4 border-[#F44336] bg-[#f6f3f2]">🏥<br><span class="text-xs">병원</span></button>
        <button class="h-[72px] rounded-lg border-b-4 border-[#9C27B0] bg-[#f6f3f2]">💊<br><span class="text-xs">약국</span></button>
        <button class="h-[72px] rounded-lg border-b-4 border-[#FF5722] bg-[#f6f3f2]">🏪<br><span class="text-xs">편의점</span></button>
      </div>

      <div class="h-12 rounded-lg bg-[#e9f6ea] px-3 flex items-center text-[#006e1c] text-sm">목적지를 찾았습니다.</div>
    </section>

    <section class="h-1/2 relative bg-[#e4e2e1]">
      <div class="absolute inset-0 bg-[url('https://tile.openstreetmap.org/15/27937/12641.png')] bg-cover bg-center"></div>
      <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-full text-4xl">📍</div>
    </section>
  </main>

  <nav class="h-16 border-t border-[#becab9] bg-white grid grid-cols-4 text-xs">
    <a class="flex flex-col items-center justify-center text-[#0061a4] font-bold" href="mobile-main.html">Map</a>
    <a class="flex flex-col items-center justify-center" href="mobile-search.html">Search</a>
    <a class="flex flex-col items-center justify-center" href="mobile-saved.html">Saved</a>
    <a class="flex flex-col items-center justify-center" href="mobile-profile.html">Profile</a>
  </nav>

  <script>
    let lat = 37.5665;
    let lng = 126.9780;
    const coords = document.getElementById('coords');
    setInterval(() => {
      lat += (Math.random() - 0.5) * 0.00007;
      lng += (Math.random() - 0.5) * 0.00007;
      coords.textContent = `(${lat.toFixed(4)}, ${lng.toFixed(4)})`;
    }, 3500);
  </script>
</body>
</html>
