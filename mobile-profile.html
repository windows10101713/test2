<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LMN 모바일 내 정보 탭</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fbf9f8] text-[#1b1c1c] min-h-screen">
  <header class="h-11 border-b border-[#becab9] bg-white px-4 flex items-center justify-between sticky top-0">
    <strong>내 정보</strong>
    <a href="index.html" class="text-xs text-[#0061a4]">목록</a>
  </header>

  <main class="pb-20 px-4 py-4 space-y-4">
    <section class="rounded-xl border border-[#becab9] bg-white p-4 flex items-center gap-3">
      <div class="w-14 h-14 rounded-full bg-[#d1e4ff]"></div>
      <div>
        <p class="font-semibold">Hello, Guest</p>
        <p class="text-xs text-[#6f7a6b]">Anonymous Session Active</p>
      </div>
    </section>

    <section class="rounded-xl border border-[#becab9] bg-white divide-y">
      <div class="p-4 flex items-center justify-between"><span>Language</span><span class="text-sm text-[#0061a4]">KO / EN</span></div>
      <div class="p-4 flex items-center justify-between"><span>Search Radius</span><span class="text-sm text-[#0061a4]">1.5km</span></div>
      <div class="p-4 flex items-center justify-between"><span>Display Theme</span><span class="text-sm text-[#0061a4]">Light</span></div>
    </section>

    <button class="w-full rounded-xl border border-[#ffdad6] bg-[#fff2f0] text-[#ba1a1a] p-3 font-semibold">Reset All Local Data</button>
  </main>

  <nav class="fixed bottom-0 w-full h-16 border-t border-[#becab9] bg-white grid grid-cols-4 text-xs">
    <a class="flex items-center justify-center" href="mobile-main.html">Map</a>
    <a class="flex items-center justify-center" href="mobile-search.html">Search</a>
    <a class="flex items-center justify-center" href="mobile-saved.html">Saved</a>
    <a class="flex items-center justify-center font-bold text-[#0061a4]" href="mobile-profile.html">Profile</a>
  </nav>
</body>
</html>
