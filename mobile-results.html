<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LMN 모바일 검색 결과</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen overflow-hidden bg-[#fbf9f8] text-[#1b1c1c]">
  <header class="h-11 border-b border-[#becab9] bg-white px-4 flex items-center justify-between">
    <strong>결과 목록</strong>
    <a href="index.html" class="text-xs text-[#0061a4]">목록</a>
  </header>

  <main class="h-[calc(100vh-44px-64px)] relative">
    <div class="absolute inset-0 bg-[#e4e2e1]"></div>

    <section class="absolute inset-x-0 bottom-0 max-h-[75%] bg-white rounded-t-3xl border-t border-[#becab9] shadow-2xl flex flex-col">
      <div class="p-4 border-b border-[#becab9]">
        <p class="font-bold">결과 목록 (5개 발견)</p>
      </div>
      <div class="grid grid-cols-[40px_1fr_80px_80px] text-xs text-[#6f7a6b] px-4 py-2 border-b border-[#becab9]">
        <div>순번</div><div>시설명</div><div class="text-right">거리</div><div class="text-center">카테고리</div>
      </div>
      <div class="overflow-auto">
        <div class="grid grid-cols-[40px_1fr_80px_80px] items-center px-4 h-14 border-b border-[#e4e2e1]"><div class="border-l-4 border-[#9C27B0] pl-1">1</div><div>가나다약국</div><div class="text-right">0.42km</div><div class="text-center text-[#9C27B0]">약국</div></div>
        <div class="grid grid-cols-[40px_1fr_80px_80px] items-center px-4 h-14 border-b border-[#e4e2e1]"><div class="border-l-4 border-[#9C27B0] pl-1">2</div><div>라마바약국</div><div class="text-right">0.58km</div><div class="text-center text-[#9C27B0]">약국</div></div>
        <div class="grid grid-cols-[40px_1fr_80px_80px] items-center px-4 h-14 border-b border-[#e4e2e1]"><div class="border-l-4 border-[#F44336] pl-1">3</div><div>서울시병원</div><div class="text-right">0.75km</div><div class="text-center text-[#F44336]">병원</div></div>
        <div class="grid grid-cols-[40px_1fr_80px_80px] items-center px-4 h-14 border-b border-[#e4e2e1]"><div class="border-l-4 border-[#FF5722] pl-1">4</div><div>CU 강남점</div><div class="text-right">0.89km</div><div class="text-center text-[#FF5722]">편의점</div></div>
        <div class="grid grid-cols-[40px_1fr_80px_80px] items-center px-4 h-14 border-b border-[#e4e2e1]"><div>5</div><div>GS25 역삼점</div><div class="text-right">1.02km</div><div class="text-center text-[#FF5722]">편의점</div></div>
      </div>
    </section>
  </main>

  <nav class="h-16 border-t border-[#becab9] bg-white grid grid-cols-4 text-xs">
    <a class="flex items-center justify-center" href="mobile-main.html">Map</a>
    <a class="flex items-center justify-center font-bold text-[#0061a4]" href="mobile-results.html">Search</a>
    <a class="flex items-center justify-center" href="mobile-saved.html">Saved</a>
    <a class="flex items-center justify-center" href="mobile-profile.html">Profile</a>
  </nav>
</body>
</html>
