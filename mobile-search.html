<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LMN 모바일 검색 탭</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fbf9f8] text-[#1b1c1c] min-h-screen">
  <header class="h-11 border-b border-[#becab9] bg-white px-4 flex items-center justify-between sticky top-0">
    <strong>검색</strong>
    <a href="index.html" class="text-xs text-[#0061a4]">목록</a>
  </header>

  <main class="pb-20 px-4 py-4 space-y-5">
    <div class="relative">
      <input class="w-full h-11 rounded-lg border border-[#becab9] px-3" placeholder="Search destinations, shops..." />
    </div>

    <section>
      <div class="flex justify-between items-center mb-2">
        <h2 class="font-semibold">Recent Searches</h2>
        <button class="text-xs text-[#0061a4]">Clear All</button>
      </div>
      <div class="space-y-2">
        <div class="h-11 bg-white border border-[#becab9] rounded-lg px-3 flex items-center">Central Park Medical</div>
        <div class="h-11 bg-white border border-[#becab9] rounded-lg px-3 flex items-center">24/7 Pharmacy Downtown</div>
      </div>
    </section>

    <section>
      <h2 class="font-semibold mb-2">Trending Categories</h2>
      <div class="grid grid-cols-4 gap-2 text-xs text-center">
        <div class="h-20 rounded-xl bg-[#ffdad6] flex items-center justify-center">Hospital</div>
        <div class="h-20 rounded-xl bg-[#d1e4ff] flex items-center justify-center">Pharmacy</div>
        <div class="h-20 rounded-xl bg-[#ffdcbe] flex items-center justify-center">Convenience</div>
        <div class="h-20 rounded-xl bg-[#e4e2e1] flex items-center justify-center">Gas</div>
      </div>
    </section>
  </main>

  <nav class="fixed bottom-0 w-full h-16 border-t border-[#becab9] bg-white grid grid-cols-4 text-xs">
    <a class="flex items-center justify-center" href="mobile-main.html">Map</a>
    <a class="flex items-center justify-center font-bold text-[#0061a4]" href="mobile-search.html">Search</a>
    <a class="flex items-center justify-center" href="mobile-saved.html">Saved</a>
    <a class="flex items-center justify-center" href="mobile-profile.html">Profile</a>
  </nav>
</body>
</html>
